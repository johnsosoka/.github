# Reusable workflow: AI-powered code review
# Usage:
#   jobs:
#     review:
#       uses: johnsosoka/.github/.github/workflows/ai-code-review.yml@main
#       secrets:
#         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
#
#   Optional inputs:
#     ai_provider: 'openai'
#     openai_model: 'gpt-4o'
#     timeout-minutes: 10
#     include_extensions: '.py,.js,.ts,.tsx,.go,.rs,.java,.kt,.swift,.rb,.php,.c,.cpp,.h,.hpp,.cs,.scala,.r,.m,.mm'
#     exclude_paths: 'node_modules/,dist/,build/,vendor/,target/,out/,.next/,coverage/,*.min.js,*.min.css,package-lock.json,yarn.lock,poetry.lock,Cargo.lock,go.sum,__tests__/,test/,tests/,fixtures/,mocks/,*.generated.*'

name: AI Code Review

on:
  workflow_call:
    inputs:
      ai_provider:
        description: 'AI provider to use'
        required: false
        type: string
        default: 'openai'
      openai_model:
        description: 'OpenAI model to use for review'
        required: false
        type: string
        default: 'gpt-4o'
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 10
      include_extensions:
        description: 'Comma-separated list of file extensions to include'
        required: false
        type: string
        default: '.py,.js,.ts,.tsx,.go,.rs,.java,.kt,.swift,.rb,.php,.c,.cpp,.h,.hpp,.cs,.scala,.r,.m,.mm'
      exclude_paths:
        description: 'Comma-separated list of paths/patterns to exclude'
        required: false
        type: string
        default: 'node_modules/,dist/,build/,vendor/,target/,out/,.next/,coverage/,*.min.js,*.min.css,package-lock.json,yarn.lock,poetry.lock,Cargo.lock,go.sum,__tests__/,test/,tests/,fixtures/,mocks/,*.generated.*'
    secrets:
      OPENAI_API_KEY:
        description: 'OpenAI API key'
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: AI Code Review
        uses: AleksandrFurmenkovOfficial/ai-code-review@v1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ai_provider: ${{ inputs.ai_provider }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          openai_model: ${{ inputs.openai_model }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          pr_number: ${{ github.event.number }}
          include_extensions: ${{ inputs.include_extensions }}
          exclude_paths: ${{ inputs.exclude_paths }}
